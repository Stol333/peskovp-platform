name: peskovp-platform
services:
  ai-module:
    build:
      context: ..
      dockerfile: services/ai-module/Dockerfile
    image: peskovp/ai-module:phase09
    env_file:
      - ./env/ai-module.env.example
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ai_module_logs:/app/services/ai-module/logs
      - ./healthchecks/ai_module_healthcheck.py:/opt/healthchecks/ai_module_healthcheck.py:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "/opt/healthchecks/ai_module_healthcheck.py"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - peskovp_internal

  vpn-readonly:
    profiles: ["vpn-readonly"]
    build:
      context: ..
      dockerfile: integrations/vpn/Dockerfile
    image: peskovp/vpn-readonly:phase09
    env_file:
      - ./env/vpn-readonly.env.example
    restart: "no"
    networks:
      - peskovp_internal

volumes:
  ai_module_logs:
    name: peskovp_ai_module_logs

networks:
  peskovp_internal:
    name: peskovp_internal
    driver: bridge
