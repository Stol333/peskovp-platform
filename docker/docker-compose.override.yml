services:
  ai-module:
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8787", "--reload"]
    environment:
      APP_ENV: development
      AI_STREAMING_ENABLED: "true"
      AI_USAGE_LOG_PATH: /app/services/ai-module/logs/usage.jsonl
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - ../services/ai-module:/app/services/ai-module
      - ai_module_logs:/app/services/ai-module/logs

  vpn-readonly:
    environment:
      VPN_HTTP_TIMEOUT_SECONDS: "15"
