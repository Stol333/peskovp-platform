name: phase23-integration

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/phase23-integration.yml"
      - "apps/api/**"
      - "apps/web/**"
      - "packages/payments/**"
      - "docker/docker-compose.prod.yml"
      - "tests/integration/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/phase23-integration.yml"
      - "apps/api/**"
      - "apps/web/**"
      - "packages/payments/**"
      - "docker/docker-compose.prod.yml"
      - "tests/integration/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phase23-payment-subscription-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify Python runtime
        run: |
          echo "python_path=${{ steps.setup-python.outputs['python-path'] }}"
          "${{ steps.setup-python.outputs['python-path'] }}" --version
      - name: Prepare PHASE 23 CI env file
        run: |
          python - <<'PY'
          from pathlib import Path
          lines = [
              "APP_ENV=ci",
              "APP_BIND_PORT=3100",
              "API_BIND_PORT=18080",
              "AI_BIND_PORT=8787",
              "AUTH_SECRET=ci-auth-secret",
              "NEXTAUTH_SECRET=ci-nextauth-secret",
              "POSTGRES_USER=peskovp",
              "POSTGRES_DB=peskovp",
              "POSTGRES_PASSWORD=ci-postgres-password",
              "DATABASE_URL=postgresql://peskovp:ci-postgres-password@postgres:5432/peskovp",
              "REDIS_URL=redis://redis:6379/0",
              "PAYMENT_PROVIDER=telegram_stars",
              "PAYMENTS_TELEGRAM_WEBHOOK_SECRET=ci-phase23-telegram-secret",
              "PAYMENTS_YOOKASSA_WEBHOOK_SECRET=ci-phase23-yookassa-secret",
              "YOOKASSA_SHOP_ID=ci-yookassa-shop-id",
              "YOOKASSA_SECRET_KEY=ci-yookassa-secret",
              "CLOUDPAYMENTS_API_SECRET=ci-cloudpayments-secret",
              "TELEGRAM_BOT_TOKEN=ci-telegram-bot-token",
              "TELEGRAM_WEBHOOK_SECRET=ci-telegram-webhook-secret",
              "TELEGRAM_INITDATA_MAX_AGE_SECONDS=300",
              "TELEGRAM_MINI_APP_URL=https://t.me/peskovp_bot/app",
              "VPN_V2_CANARY_PERCENT=1",
              "VPN_V2_CANARY_SALT=ci-phase23-canary-salt",
              "VPN_V2_CANARY_TEST_USERS=phase23-ci-user",
              "VPN_V2_REGISTRY_PATH=apps/api/src/vpn_v2_api/sample_nodes.json",
              "VPN_V2_TELEGRAM_MINIAPP_URL=https://t.me/peskovp_bot/app",
              "VPN_V2_HIDDEN_SUBSCRIPTION_PATH=/v2/subscription/canary",
              "VPN_V2_SUBSCRIPTION_DOMAIN=sub.peskovp.com",
              "VPN_V2_ENABLE_RF_GATEWAY=true",
              "VPN_WRITE_ENABLED=false",
              "VPN_PROVISIONING_DRY_RUN=true",
              "VPN_PROVISIONING_EXPLICIT_APPROVAL=true",
              "AI_PROVIDER=openai",
              "AI_MODEL=gpt-5",
              "OPENAI_API_KEY=ci-openai-api-key",
              "OPENAI_BASE_URL=https://api.openai.com/v1",
              "AI_REQUIRE_AUTH=true",
              "AI_API_AUTH_TOKEN=ci-ai-auth-token",
              "AI_RATE_LIMIT_RPM=20",
              "AI_MAX_PROMPT_CHARS=6000",
              "AI_HISTORY_LIMIT=50",
              "AI_DEFAULT_TEMPLATE=support_assistant",
              "AI_STREAMING_ENABLED=true",
              "AI_LOG_SUMMARY_MAX_CHARS=30000",
              "AI_LOG_SUMMARY_MAX_LINES=20",
              "LOG_MAX_SIZE=10m",
              "LOG_MAX_FILES=3",
          ]
          Path("docker/env/phase23.ci.generated.env").write_text("\\n".join(lines) + "\\n", encoding="utf-8")
          PY

      - name: Build and start integration stack
        run: docker compose -f docker/docker-compose.prod.yml --env-file docker/env/phase23.ci.generated.env up -d --build --no-deps web-app

      - name: Run PHASE 23 payment/subscription smoke
        run: "${{ steps.setup-python.outputs['python-path'] }}" tests/integration/phase23_payment_subscription_smoke.py --base-url http://127.0.0.1:3100 --webhook-secret ci-phase23-telegram-secret --artifacts-dir artifacts/phase23_ci

      - name: Capture web-app audit logs
        if: always()
        run: |
          mkdir -p artifacts/phase23_ci
          docker compose -f docker/docker-compose.prod.yml --env-file docker/env/phase23.ci.generated.env logs --no-color web-app > artifacts/phase23_ci/web-app.log || true
          if ! grep -q "payments.audit" artifacts/phase23_ci/web-app.log; then
            echo "payments.audit events were not found in web-app logs"
            exit 1
          fi

      - name: Upload PHASE 23 integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase23-ci-artifacts
          path: artifacts/phase23_ci
          if-no-files-found: warn

      - name: Tear down integration stack
        if: always()
        run: docker compose -f docker/docker-compose.prod.yml --env-file docker/env/phase23.ci.generated.env down -v --remove-orphans
